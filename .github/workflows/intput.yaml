name: givetheinputs
on:
  workflow_dispatch:
   inputs:
    environment:
       description: select the environment
       required: true 
       type: choice
       options:
         - dev
         - test
         - prod
          
jobs:
  inputtrigger:
     runs-on: ubuntu-latest
     steps:
       - name: printtheenvironment
         run: echo "print the envornemnt ${{ inputs.environment }}"
    
  
  
